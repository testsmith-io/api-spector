<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Ghost body: radial depth, light source top-left -->
    <radialGradient id="body" cx="35%" cy="22%" r="70%">
      <stop offset="0%"   stop-color="#5497c8"/>
      <stop offset="55%"  stop-color="#205d96"/>
      <stop offset="100%" stop-color="#123a60"/>
    </radialGradient>

    <!-- Glass gloss on ghost body -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="white" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.0"/>
    </linearGradient>

    <!-- Clip gloss to ghost body shape -->
    <clipPath id="ghostClip">
      <path d="M 130,225 C 130,95 382,95 382,225 L 382,390 Q 340,435 298,390 Q 256,435 214,390 Q 172,435 130,390 Z"/>
    </clipPath>
  </defs>

  <!-- Soft drop shadow (subtle, sits behind ghost) -->
  <ellipse cx="256" cy="420" rx="130" ry="18" fill="black" opacity="0.18"/>

  <!-- Ghost body -->
  <path d="
    M 130,225
    C 130,95 382,95 382,225
    L 382,390
    Q 340,435 298,390
    Q 256,435 214,390
    Q 172,435 130,390
    Z
  " fill="url(#body)"/>

  <!-- Left eye -->
  <ellipse cx="198" cy="262" rx="29" ry="33" fill="white"/>
  <!-- Right eye -->
  <ellipse cx="314" cy="262" rx="29" ry="33" fill="white"/>

  <!-- Left pupil -->
  <ellipse cx="204" cy="268" rx="16" ry="20" fill="#0b1624"/>
  <!-- Right pupil -->
  <ellipse cx="320" cy="268" rx="16" ry="20" fill="#0b1624"/>

  <!-- Eye shines -->
  <ellipse cx="192" cy="252" rx="6" ry="7" fill="white" opacity="0.65"/>
  <ellipse cx="308" cy="252" rx="6" ry="7" fill="white" opacity="0.65"/>

  <!-- Glass gloss clipped to ghost shape -->
  <ellipse cx="256" cy="100" rx="200" ry="180" fill="url(#gloss)" clip-path="url(#ghostClip)"/>
</svg>
