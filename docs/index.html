<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>api Spector</title>
  <meta name="description" content="Local-first API testing tool — inspect, test and mock APIs">
  <link rel="icon" href="_icon.svg" type="image/svg+xml">

  <!-- Docsify theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <style>
    :root {
      --theme-color: #2196f3;
      --sidebar-width: 260px;
    }

    .app-name-link img {
      width: 28px;
      height: 28px;
      vertical-align: middle;
      margin-right: 8px;
    }

    .sidebar .app-name {
      display: flex;
      align-items: center;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: '<img src="_icon.svg" alt=""> api Spector',
      repo: 'https://github.com/testsmith-io/api-spector',
      routerMode: 'hash',
      homepage: 'README.md',

      // Sidebar
      loadSidebar: true,
      autoHeader: true,
      subMaxLevel: 2,

      // Navigation
      loadNavbar: false,

      // Search
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search documentation...',
        noData: 'No results found.',
        depth: 3
      },

      // Copy code button
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied'
      },

      themeColor: '#2196f3',

      // Tabs plugin
      tabs: {
        persist: true,
        sync: true,
        theme: 'classic',
        tabComments: true,
        tabHeadings: true
      }
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1/dist/docsify-tabs.min.js"></script>
</body>
</html>
